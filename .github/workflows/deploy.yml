name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from packageManager in package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first: server tests import @vocab/shared, whose entry points at dist/.
      - run: pnpm -r build
      - run: pnpm -r lint
      - run: pnpm -r test

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        # GHCR requires a lowercase image path; repository owner may contain capitals.
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}/server" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE || 'server' }}
    steps:
      # --from-source makes Railway re-pull the moved :latest tag instead of
      # reusing the previous deployment's image digest.
      # Skipped until the RAILWAY_TOKEN project-token secret is configured (task 7.3);
      # the secrets context is unavailable in job-level `if`, hence the step-level guard.
      - name: Redeploy service with fresh image
        if: env.RAILWAY_TOKEN != ''
        run: railway redeploy --service "$RAILWAY_SERVICE" --from-source --yes
