name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from packageManager in package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint
      - run: pnpm -r test
      - run: pnpm -r build

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        # GHCR requires a lowercase image path; repository owner may contain capitals.
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}/server" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    # Koyeb never re-pulls a moved tag on its own — an explicit redeploy is required.
    # Skipped until the KOYEB_API_TOKEN secret is configured (task 7.3).
    if: ${{ secrets.KOYEB_API_TOKEN != '' }}
    env:
      KOYEB_API_TOKEN: ${{ secrets.KOYEB_API_TOKEN }}
      KOYEB_APP: ${{ vars.KOYEB_APP || 'vocab-learner' }}
      KOYEB_SERVICE: ${{ vars.KOYEB_SERVICE || 'server' }}
    steps:
      - name: Install Koyeb CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | sh
          echo "$HOME/.koyeb/bin" >> "$GITHUB_PATH"
      - name: Redeploy service
        run: koyeb services redeploy "$KOYEB_APP/$KOYEB_SERVICE" --token "$KOYEB_API_TOKEN" --wait --wait-timeout 10m
