name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from packageManager in package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first: server tests import @vocab/shared, whose entry points at dist/.
      - run: pnpm -r build
      - run: pnpm -r lint
      - run: pnpm -r test

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: server
            dockerfile: apps/server/Dockerfile
            build-args: ""
          - name: web
            dockerfile: apps/web/Dockerfile
            # VITE_* values are baked into the static bundle at build time
            # (public, non-secret) — set them as GitHub repo variables.
            build-args: |
              VITE_API_URL=${{ vars.VITE_API_URL }}
              VITE_TG_BOT_USERNAME=${{ vars.VITE_TG_BOT_USERNAME }}
              VITE_YOUGLISH_LANG=${{ vars.VITE_YOUGLISH_LANG || 'english' }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        # GHCR requires a lowercase image path; repository owner may contain capitals.
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}/${{ matrix.name }}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build-args }}
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE || 'server' }}
      RAILWAY_SERVICE_WEB: ${{ vars.RAILWAY_SERVICE_WEB || 'web' }}
    steps:
      # --from-source makes Railway re-pull the moved :latest tag instead of
      # reusing the previous deployment's image digest.
      # Skipped until the RAILWAY_TOKEN project-token secret is configured (task 7.3);
      # the secrets context is unavailable in job-level `if`, hence the step-level guard.
      - name: Redeploy server with fresh image
        if: env.RAILWAY_TOKEN != ''
        run: railway redeploy --service "$RAILWAY_SERVICE" --from-source --yes
      - name: Redeploy web with fresh image
        if: env.RAILWAY_TOKEN != ''
        run: railway redeploy --service "$RAILWAY_SERVICE_WEB" --from-source --yes
