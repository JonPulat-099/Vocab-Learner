<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="light dark" />
    <title>Vocab Learner</title>
    <!-- Telegram Mini App bridge: provides window.Telegram.WebApp and --tg-theme-* CSS vars. -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Anti-flash: apply the saved/OS theme before first paint (mirrors useTheme's detect). -->
    <script>
      (function () {
        var t = localStorage.getItem("vocab_theme");
        if (t !== "light" && t !== "dark") {
          var tg = window.Telegram && window.Telegram.WebApp;
          t = tg && tg.initData
            ? tg.colorScheme
            : matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
